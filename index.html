<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Alitec OS">
<meta name="theme-color" content="#1C1C1E" id="theme-meta">
<link rel="manifest" href="/manifest.json">
<link rel="apple-touch-icon" href="/icon-192.png">
<title>Alitec OS</title>
<style>
/* ── TOKENS ─────────────────────────────────────────────── */
:root{
  --bg:#FAFAFA; --bg2:#F5F5F5; --surface:#FFFFFF; --surface2:#F0F0F0;
  --border:rgba(0,0,0,.07); --border-med:rgba(0,0,0,.12);
  --text:#111111; --text2:#444444; --text3:#888888; --text4:#BBBBBB;
  --red:#9B1B1B; --red-soft:#FDF2F2; --red-badge:#E53E3E;
  --green:#1A6B40; --green-soft:#F0FAF4;
  --orange:#9B4A00; --orange-soft:#FFF7ED;
  --blue:#1A3A8F; --blue-soft:#EEF3FF;
  --safe-t:env(safe-area-inset-top);
  --safe-b:env(safe-area-inset-bottom);
  --r:10px; --r-lg:14px; --r-xl:18px; --r-pill:999px;
  --font:-apple-system,BlinkMacSystemFont,"SF Pro Display","SF Pro Text","Helvetica Neue",sans-serif;
  --trans:.22s cubic-bezier(.4,0,.2,1);
}
@media(prefers-color-scheme:dark){
  :root{
    --bg:#111111; --bg2:#1A1A1A; --surface:#1E1E1E; --surface2:#2A2A2A;
    --border:rgba(255,255,255,.07); --border-med:rgba(255,255,255,.12);
    --text:#F5F5F5; --text2:#CCCCCC; --text3:#888888; --text4:#555555;
    --red:#E05555; --red-soft:#2A1A1A; --red-badge:#E05555;
    --green:#4ADE80; --green-soft:#0F2A1A;
    --orange:#FFA040; --orange-soft:#2A1E0F;
    --blue:#6B9EFF; --blue-soft:#0F1A2A;
  }
}

/* ── RESET ───────────────────────────────────────────────── */
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;overflow:hidden;font-family:var(--font);background:var(--bg);color:var(--text);-webkit-font-smoothing:antialiased;}

/* ── LAYOUT ──────────────────────────────────────────────── */
.app{display:flex;height:100vh;height:100dvh;}

/* SIDEBAR ── desktop only */
.sidebar{
  width:240px;min-height:100%;background:var(--surface);
  border-right:1px solid var(--border);display:flex;flex-direction:column;
  flex-shrink:0;
}
.sidebar-logo{
  padding:calc(24px + var(--safe-t)) 20px 20px;
  border-bottom:1px solid var(--border);
}
.sidebar-logo img{height:28px;object-fit:contain;display:block;}
.sidebar-nav{flex:1;padding:10px 8px;overflow-y:auto;}
.nav-group-label{
  font-size:10px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;
  color:var(--text4);padding:14px 12px 6px;
}
.nav-item{
  display:flex;align-items:center;gap:10px;padding:9px 12px;
  border-radius:var(--r);font-size:13.5px;color:var(--text3);
  cursor:pointer;transition:all var(--trans);border:none;background:none;
  width:100%;text-align:left;font-family:var(--font);font-weight:400;
  position:relative;
}
.nav-item:hover{background:var(--bg2);color:var(--text);}
.nav-item.active{background:var(--bg2);color:var(--text);font-weight:500;}
.nav-item.active::before{
  content:'';position:absolute;left:0;top:20%;bottom:20%;
  width:3px;background:var(--red);border-radius:0 2px 2px 0;
}
.ni-icon{
  width:26px;height:26px;border-radius:7px;background:var(--bg2);
  display:flex;align-items:center;justify-content:center;
  font-size:13px;flex-shrink:0;transition:background var(--trans);
}
.nav-item.active .ni-icon{background:var(--red-soft);}
.nav-badge{
  margin-left:auto;background:var(--red-badge);color:#fff;
  font-size:10px;font-weight:700;padding:1px 6px;
  border-radius:var(--r-pill);min-width:18px;text-align:center;
}
.sidebar-bottom{padding:10px 8px calc(16px + var(--safe-b));border-top:1px solid var(--border);}

/* MAIN */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0;}
.topbar-mobile{
  display:none;align-items:center;justify-content:space-between;
  padding:calc(var(--safe-t) + 10px) 16px 10px;
  background:var(--surface);border-bottom:1px solid var(--border);
  position:sticky;top:0;z-index:20;
  transition:background var(--trans);
}
.topbar-mobile .page-name{font-size:17px;font-weight:600;letter-spacing:-.02em;}
.topbar-btn{
  width:32px;height:32px;border-radius:50%;background:var(--bg2);
  border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;
  color:var(--text3);transition:all var(--trans);
}
.topbar-btn:active{transform:scale(.9);background:var(--border-med);}

/* PAGE WRAP */
.page-wrap{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;}
.page{display:none;}
.page.active{display:block;}

/* BOTTOM NAV ── mobile only */
.bottom-nav{
  display:none;position:fixed;bottom:0;left:0;right:0;z-index:100;
  background:var(--surface);border-top:1px solid var(--border);
  padding:6px 0 calc(6px + var(--safe-b));
}
.bn-items{display:flex;justify-content:space-around;}
.bn-item{
  display:flex;flex-direction:column;align-items:center;gap:3px;
  font-size:10px;font-weight:500;color:var(--text4);
  cursor:pointer;padding:4px 16px;border:none;background:none;
  font-family:var(--font);position:relative;
  transition:color var(--trans);
}
.bn-item svg{width:22px;height:22px;transition:transform var(--trans);}
.bn-item.active{color:var(--red);}
.bn-item:active svg{transform:scale(.88);}
.bn-dot{
  position:absolute;top:3px;right:10px;
  width:7px;height:7px;background:var(--red-badge);
  border-radius:50%;border:1.5px solid var(--surface);
}

@media(max-width:768px){
  .sidebar{display:none;}
  .topbar-mobile{display:flex;}
  .bottom-nav{display:block;}
  .page{padding-bottom:calc(70px + var(--safe-b));}
}

/* ── TYPOGRAPHY ──────────────────────────────────────────── */
.page-header{padding:24px 20px 8px;}
.page-title{font-size:30px;font-weight:700;letter-spacing:-.03em;}
.page-title span{color:var(--text3);font-weight:300;}
.section-label{
  font-size:11px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;
  color:var(--text4);padding:16px 20px 6px;
}

/* ── CARDS ───────────────────────────────────────────────── */
.card-group{margin:0 16px 8px;border-radius:var(--r-lg);overflow:hidden;border:1px solid var(--border);}
.card-row{
  background:var(--surface);padding:13px 16px;
  border-bottom:1px solid var(--border);
  transition:background var(--trans);
  cursor:pointer;
}
.card-row:last-child{border-bottom:none;}
.card-row:active{background:var(--bg2);}
.card-solo{background:var(--surface);border-radius:var(--r-lg);border:1px solid var(--border);margin:0 16px 8px;overflow:hidden;}

/* ── BADGES ──────────────────────────────────────────────── */
.badge{display:inline-flex;align-items:center;font-size:11px;font-weight:600;padding:2px 8px;border-radius:var(--r-pill);letter-spacing:.02em;}
.b-novo{background:var(--blue-soft);color:var(--blue);}
.b-contactado{background:var(--orange-soft);color:var(--orange);}
.b-proposta{background:#F3EEFF;color:#6B3FA0;}
.b-negociacao{background:var(--orange-soft);color:var(--orange);}
.b-ganho{background:var(--green-soft);color:var(--green);}
.b-perdido{background:var(--bg2);color:var(--text4);}
.b-overdue{background:var(--red-soft);color:var(--red);}
.b-today{background:var(--orange-soft);color:var(--orange);}
.b-soon{background:var(--green-soft);color:var(--green);}
.b-inactive{background:var(--orange-soft);color:var(--orange);}

/* ── HOME ────────────────────────────────────────────────── */
.home-header{
  padding:calc(20px + var(--safe-t)) 20px 20px;
  background:var(--surface);
  border-bottom:1px solid var(--border);
  margin-bottom:4px;
}
.greeting{font-size:26px;font-weight:700;letter-spacing:-.03em;margin-bottom:3px;}
.greeting-sub{font-size:14px;color:var(--text3);font-weight:400;}

/* BRIEFING CARD */
.briefing-card{
  margin:12px 16px;
  background:var(--text);
  border-radius:var(--r-xl);
  padding:18px 20px;
  color:var(--bg);
  position:relative;overflow:hidden;
}
.briefing-card::before{
  content:'';position:absolute;top:-40px;right:-40px;
  width:120px;height:120px;border-radius:50%;
  background:var(--red);opacity:.15;
}
.briefing-label{font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;opacity:.5;margin-bottom:10px;}
.briefing-text{font-size:14px;line-height:1.65;opacity:.9;}
.briefing-skeleton{
  height:56px;background:rgba(255,255,255,.08);
  border-radius:var(--r);
  animation:shimmer 1.5s infinite;
  background:linear-gradient(90deg,rgba(255,255,255,.05) 0%,rgba(255,255,255,.12) 50%,rgba(255,255,255,.05) 100%);
  background-size:200% 100%;
}
@keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}
.briefing-footer{display:flex;align-items:center;justify-content:flex-end;margin-top:12px;}
.btn-speak{
  background:rgba(255,255,255,.12);border:none;color:inherit;
  border-radius:var(--r-pill);padding:6px 14px;font-size:12px;font-weight:600;
  cursor:pointer;font-family:var(--font);
  transition:background var(--trans);display:flex;align-items:center;gap:6px;
}
.btn-speak:active{background:rgba(255,255,255,.22);}

/* CAPTURE */
.capture-wrap{margin:12px 16px;}
.capture-card{
  background:var(--surface);border:1px solid var(--border);
  border-radius:var(--r-xl);padding:14px 16px;
  transition:border-color var(--trans),box-shadow var(--trans);
}
.capture-card:focus-within{border-color:var(--border-med);box-shadow:0 2px 12px rgba(0,0,0,.06);}
.capture-row{display:flex;gap:10px;align-items:flex-end;}
.capture-input{
  flex:1;background:none;border:none;outline:none;
  font-size:15px;font-family:var(--font);color:var(--text);
  resize:none;height:40px;line-height:1.5;
  transition:height var(--trans);
}
.capture-input::placeholder{color:var(--text4);}
.capture-input:focus{height:80px;}
.capture-btns{display:flex;gap:8px;}
.btn-circle{
  width:38px;height:38px;border-radius:50%;border:none;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  transition:all var(--trans);flex-shrink:0;
}
.btn-mic{background:var(--bg2);color:var(--text3);}
.btn-mic:active,.btn-mic.recording{background:var(--red);color:#fff;}
.btn-send{background:var(--text);color:var(--bg);}
.btn-send:active{transform:scale(.9);opacity:.8;}
.capture-feedback{
  font-size:13px;color:var(--text3);line-height:1.5;
  max-height:0;overflow:hidden;transition:max-height .3s ease,padding .3s ease;
}
.capture-feedback.show{max-height:200px;padding-top:10px;}

/* PRIORITY ITEMS */
.priority-item{
  display:flex;align-items:center;gap:12px;padding:12px 16px;
  background:var(--surface);
  transition:background var(--trans);cursor:pointer;
}
.priority-item:active{background:var(--bg2);}
.pi-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;}
.pi-dot.red{background:var(--red-badge);}
.pi-dot.orange{background:#F59E0B;}
.pi-dot.green{background:#10B981;}
.pi-content{flex:1;min-width:0;}
.pi-title{font-size:15px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.pi-sub{font-size:13px;color:var(--text3);margin-top:1px;}
.pi-arrow{color:var(--text4);}

/* LEAD CARD */
.lead-card{
  background:var(--surface);padding:14px 16px;
  border-bottom:1px solid var(--border);
  cursor:pointer;transition:background var(--trans);
}
.lead-card:last-child{border-bottom:none;}
.lead-card:active{background:var(--bg2);}
.lead-name{font-size:16px;font-weight:600;letter-spacing:-.01em;margin-bottom:3px;}
.lead-meta{font-size:13px;color:var(--text3);margin-bottom:8px;}
.lead-badges{display:flex;gap:5px;flex-wrap:wrap;}

/* FRENTE CARD */
.frente-card{
  background:var(--surface);padding:14px 16px;
  border-bottom:1px solid var(--border);
  cursor:pointer;transition:background var(--trans);
}
.frente-card:last-child{border-bottom:none;}
.frente-card:active{background:var(--bg2);}
.frente-row{display:flex;align-items:center;gap:12px;}
.frente-icon-wrap{
  width:38px;height:38px;border-radius:10px;background:var(--bg2);
  display:flex;align-items:center;justify-content:center;
  font-size:18px;flex-shrink:0;
}
.frente-name{font-size:15px;font-weight:600;}
.frente-estado{font-size:13px;color:var(--text3);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.frente-chevron{color:var(--text4);margin-left:auto;flex-shrink:0;}

/* PRODUCT CARD */
.product-card{background:var(--surface);padding:14px 16px;border-bottom:1px solid var(--border);}
.product-card:last-child{border-bottom:none;}
.product-name{font-size:15px;font-weight:600;margin-bottom:3px;}
.product-detail{font-size:13px;color:var(--text3);}
.product-price{font-size:22px;font-weight:300;letter-spacing:-.02em;margin-top:6px;}

/* ── BUTTONS ─────────────────────────────────────────────── */
.btn{
  display:inline-flex;align-items:center;justify-content:center;gap:7px;
  padding:11px 20px;border-radius:var(--r-lg);font-size:15px;font-weight:600;
  cursor:pointer;transition:all var(--trans);border:none;
  font-family:var(--font);letter-spacing:-.01em;
}
.btn:active{transform:scale(.97);opacity:.85;}
.btn-primary{background:var(--text);color:var(--bg);}
.btn-secondary{background:var(--bg2);color:var(--text);}
.btn-destructive{background:none;color:var(--red);}
.btn-sm{padding:8px 16px;font-size:14px;}
.btn-xs{padding:6px 12px;font-size:12px;font-weight:500;}
.btn:disabled{opacity:.4;cursor:not-allowed;transform:none;}
.btn-full{width:100%;}

/* ── FORMS ───────────────────────────────────────────────── */
.form-block{padding:0 16px 16px;}
.form-field{margin-bottom:14px;}
.form-label{
  font-size:12px;font-weight:600;text-transform:uppercase;
  letter-spacing:.05em;color:var(--text3);
  display:block;margin-bottom:7px;
}
.form-input,.form-select,.form-textarea{
  width:100%;background:var(--bg2);border:1px solid transparent;
  border-radius:var(--r);padding:12px 14px;font-size:15px;
  font-family:var(--font);color:var(--text);outline:none;
  -webkit-appearance:none;transition:all var(--trans);
}
.form-input:focus,.form-select:focus,.form-textarea:focus{
  background:var(--surface);border-color:var(--border-med);
  box-shadow:0 0 0 3px rgba(155,27,27,.08);
}
.form-textarea{resize:none;height:88px;line-height:1.5;}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;}

/* ── MODAL / SHEET ───────────────────────────────────────── */
.overlay{
  position:fixed;inset:0;background:rgba(0,0,0,0);
  z-index:200;display:flex;align-items:flex-end;
  pointer-events:none;transition:background var(--trans);
}
.overlay.open{background:rgba(0,0,0,.45);pointer-events:all;}
@media(min-width:769px){
  .overlay{align-items:center;justify-content:center;}
}
.sheet{
  background:var(--surface);width:100%;
  max-height:92vh;overflow-y:auto;
  border-radius:var(--r-xl) var(--r-xl) 0 0;
  padding-bottom:calc(20px + var(--safe-b));
  transform:translateY(100%);
  transition:transform .32s cubic-bezier(.32,.72,0,1);
}
.overlay.open .sheet{transform:translateY(0);}
@media(min-width:769px){
  .sheet{
    max-width:580px;border-radius:var(--r-xl);
    padding-bottom:20px;max-height:82vh;
    transform:scale(.95) translateY(8px);opacity:0;
    transition:transform .25s var(--trans),opacity .2s;
  }
  .overlay.open .sheet{transform:scale(1) translateY(0);opacity:1;}
}
.sheet-handle{
  width:34px;height:4px;background:var(--border-med);
  border-radius:2px;margin:10px auto 0;
}
.sheet-header{
  display:flex;align-items:flex-start;justify-content:space-between;
  padding:14px 20px 12px;
}
.sheet-title{font-size:19px;font-weight:700;letter-spacing:-.02em;}
.sheet-sub{font-size:13px;color:var(--text3);margin-top:2px;}
.sheet-close{
  width:28px;height:28px;border-radius:50%;background:var(--bg2);
  border:none;cursor:pointer;font-size:13px;color:var(--text3);
  display:flex;align-items:center;justify-content:center;
  transition:all var(--trans);flex-shrink:0;margin-top:2px;
}
.sheet-close:active{background:var(--border-med);}

/* SHEET TABS */
.sheet-tabs{
  display:flex;padding:0 16px;
  border-bottom:1px solid var(--border);margin-bottom:0;
}
.stab{
  flex:1;text-align:center;padding:10px 6px;font-size:13px;font-weight:500;
  color:var(--text3);border:none;background:none;cursor:pointer;
  border-bottom:2px solid transparent;margin-bottom:-1px;
  font-family:var(--font);transition:all var(--trans);
}
.stab.active{color:var(--red);border-bottom-color:var(--red);}
.stab-pane{display:none;animation:fadeUp .2s ease;}
.stab-pane.active{display:block;}
@keyframes fadeUp{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:none}}

/* HISTORY / UPDATE ITEMS */
.history-item{padding:12px 20px;border-bottom:1px solid var(--border);}
.history-item:last-child{border-bottom:none;}
.history-date{font-size:11px;font-weight:600;color:var(--text4);text-transform:uppercase;letter-spacing:.05em;margin-bottom:5px;}
.history-text{font-size:14px;line-height:1.55;color:var(--text2);}
.history-type{
  display:inline-block;font-size:11px;font-weight:600;
  padding:1px 8px;border-radius:var(--r-pill);
  background:var(--bg2);color:var(--text3);margin-bottom:4px;
}

/* TASK ITEM */
.task-item{
  display:flex;align-items:flex-start;gap:12px;
  padding:12px 20px;border-bottom:1px solid var(--border);
  transition:background var(--trans);
}
.task-item:last-child{border-bottom:none;}
.task-check{
  width:20px;height:20px;border-radius:50%;
  border:1.5px solid var(--border-med);flex-shrink:0;
  cursor:pointer;margin-top:2px;
  display:flex;align-items:center;justify-content:center;
  transition:all var(--trans);background:none;
}
.task-check.done{background:var(--green);border-color:var(--green);}
.task-body{flex:1;min-width:0;}
.task-text{font-size:15px;line-height:1.4;}
.task-text.done{text-decoration:line-through;color:var(--text4);}
.task-meta{font-size:12px;color:var(--text3);margin-top:3px;}
.task-prio{display:inline-flex;align-items:center;gap:3px;font-size:11px;font-weight:700;color:var(--red);}

/* FAB */
.fab{
  position:fixed;bottom:calc(78px + var(--safe-b));right:18px;
  width:50px;height:50px;background:var(--text);border-radius:50%;
  border:none;cursor:pointer;display:none;align-items:center;justify-content:center;
  box-shadow:0 4px 20px rgba(0,0,0,.2);z-index:50;
  transition:transform var(--trans),opacity var(--trans);
}
.fab:active{transform:scale(.9);}
@media(min-width:769px){.fab{bottom:24px;right:24px;}}

/* EMPTY STATE */
.empty-state{text-align:center;padding:48px 24px;color:var(--text4);}
.empty-icon{font-size:36px;margin-bottom:10px;opacity:.4;}
.empty-text{font-size:15px;}

/* INLINE ADD FORM */
.inline-form{
  background:var(--bg2);border-radius:var(--r-lg);
  margin:8px 16px;padding:14px 16px;
  max-height:0;overflow:hidden;opacity:0;
  transition:max-height .3s ease,opacity .2s,margin .3s;
}
.inline-form.open{max-height:500px;opacity:1;margin:8px 16px 0;}

/* SEPARATOR */
.sep{height:1px;background:var(--border);margin-left:20px;}

/* SPINNER */
.spin{animation:spin .7s linear infinite;display:inline-block;}
@keyframes spin{to{transform:rotate(360deg)}}

/* ALERT */
.alert{
  margin:8px 16px;padding:10px 14px;border-radius:var(--r);
  font-size:13px;font-weight:500;line-height:1.4;
  display:none;
}
.alert.show{display:block;}
.alert-warn{background:var(--orange-soft);color:var(--orange);}
.alert-error{background:var(--red-soft);color:var(--red);}
</style>
</head>
<body>
<div class="app">

  <!-- ── SIDEBAR ─────────────────────────────────────────── -->

const mktL = {portugal:'Portugal',espanha:'Espanha',canada:'Canadá',eua:'EUA',outro:'Outro'};

function today(){ return new Date().toISOString().split('T')[0]; }
function daysDiff(d){ if(!d)return null; const t=new Date();t.setHours(0,0,0,0);const x=new Date(d);x.setHours(0,0,0,0);return Math.round((x-t)/86400000); }
function daysSince(d){ if(!d)return null; const t=new Date();t.setHours(0,0,0,0);const x=new Date(d);x.setHours(0,0,0,0);return Math.round((t-x)/86400000); }
function $(id){ return document.getElementById(id); }

// ─── NAVIGATION ──────────────────────────────────────────────────────────────
const pageTitles = {home:'Home',pipeline:'Pipeline',frentes:'Frentes',produtos:'Produtos',settings:'Definições'};

function goPage(name, el){

  if(prev) { prev.style.opacity='0'; prev.style.transform='translateY(4px)'; prev.style.transition='opacity .15s,transform .15s'; setTimeout(()=>{ prev.classList.remove('active'); prev.style.opacity=''; prev.style.transform=''; prev.style.transition=''; startNewPage(name, el); }, 150); } 
  else { startNewPage(name, el); }
}
function startNewPage(name, el){

// ─── GREETING ─────────────────────────────────────────────────────────────────
function setGreeting(){
  const now = new Date();
  const h = now.getHours();
  
  const greet = h<12?'Bom dia, Samuel':h<19?'Boa tarde, Samuel':'Boa noite, Samuel';
  $('greeting').textContent = greet;
  const days = ['domingo','segunda-feira','terça-feira','quarta-feira','quinta-feira','sexta-feira','sábado'];
  const months = ['janeiro','fevereiro','março','abril','maio','junho','julho','agosto','setembro','outubro','novembro','dezembro'];
  $('greeting-sub').textContent = `Hoje é ${days[now.getDay()]}, ${now.getDate()} de ${months[now.getMonth()]}`;
}

// ─── BRIEFING ─────────────────────────────────────────────────────────────────
async function loadBriefing(){
  if(!apiKey){ $('briefing-skeleton').style.display='none'; $('briefing-text').style.display='block'; $('briefing-text').textContent='Configura a API key da Anthropic nas definições para activar o briefing.'; return; }
  try{
    // Gather data
    const active = leads.filter(l=>l.stage!=='ganho'&&l.stage!=='perdido');
    const overdue = active.filter(l=>l.followup&&daysDiff(l.followup)<0);
    const today_ = active.filter(l=>l.followup===today());
    const inactive = active.filter(l=>{const d=daysSince(l.last_interaction||l.created_at?.split('T')[0]);return d!==null&&d>=14;});
    const {data:tarefas} = await db.from('tarefas').select('*,frentes(nome)').eq('estado','aberta').eq('prioridade','alta');
    const dow = new Date().getDay();
    const isSunday = dow===0;

    const prompt = `És o assistente pessoal do Samuel Constantino, CEO da Alitec (empresa alimentar portuguesa).
Gera um briefing matinal conciso para Samuel. Português europeu, direto, sem exageros.
${isSunday?'É domingo — foca em preparar a semana que aí vem.':''}

Dados:
- Leads em atraso (${overdue.length}): ${overdue.slice(0,5).map(l=>l.company).join(', ')||'nenhum'}
- Follow-ups hoje (${today_.length}): ${today_.slice(0,5).map(l=>l.company).join(', ')||'nenhum'}
- Leads sem contacto +14d (${inactive.length}): ${inactive.slice(0,3).map(l=>l.company).join(', ')||'nenhum'}
- Tarefas urgentes: ${(tarefas||[]).slice(0,5).map(t=>`${t.frentes?.nome}: ${t.texto}`).join(' | ')||'nenhuma'}

Escreve 3-4 frases. Começa diretamente com o que é mais urgente. Sem saudações. Sem "Olá Samuel".`;

    const res = await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{'Content-Type':'application/json','x-api-key':apiKey,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},
      body:JSON.stringify({model:'claude-haiku-4-5-20251001',max_tokens:300,messages:[{role:'user',content:prompt}]})
    });
    const data = await res.json();
    briefingText = data.content?.[0]?.text || 'Erro ao gerar briefing.';
  }catch(e){ briefingText = 'Não foi possível gerar o briefing. Verifica a API key.'; }
  $('briefing-skeleton').style.display='none';
  $('briefing-text').style.display='block';
  $('briefing-text').textContent = briefingText;
}

function speakBriefing(){
  if(!briefingText) return;
  // iOS requires voices to be loaded - trigger on user gesture
  if(speechSynth.speaking){ speechSynth.cancel(); $('btn-speak').textContent='🔊 Ouvir'; return; }
  const speak = ()=>{
    const u = new SpeechSynthesisUtterance(briefingText);
    u.lang='pt-PT'; u.rate=0.9; u.pitch=1;
    // iOS fix: get voices after user gesture
    const voices = speechSynth.getVoices();
    const pt = voices.find(v=>v.lang.startsWith('pt-PT'))||voices.find(v=>v.lang.startsWith('pt'))||null;
    if(pt) u.voice=pt;
    speechSynth.speak(u);
    $('btn-speak').textContent='⏹ Parar';
    u.onend=u.onerror=()=>{ $('btn-speak').textContent='🔊 Ouvir'; };
  };
  // iOS: voices may not be loaded yet
  if(speechSynth.getVoices().length===0){
    speechSynth.addEventListener('voiceschanged',speak,{once:true});
    // fallback if voiceschanged never fires (some iOS versions)
    setTimeout(()=>{ if(!speechSynth.speaking) speak(); },300);
  } else { speak(); }
}

// ─── VOICE INPUT ──────────────────────────────────────────────────────────────
function toggleMic(){
  const SpeechRec = window.SpeechRecognition||window.webkitSpeechRecognition;
  if(!SpeechRec){ alert('O teu browser não suporta reconhecimento de voz.'); return; }
  if(isRecording){ recognition.stop(); return; }
  recognition = new SpeechRec();
  recognition.lang='pt-PT'; recognition.continuous=false; recognition.interimResults=true;
  recognition.onstart=()=>{ isRecording=true; $('btn-mic').classList.add('recording'); };
  recognition.onresult=(e)=>{
    const t=Array.from(e.results).map(r=>r[0].transcript).join('');
    $('capture-input').value=t;
  };
  recognition.onend=()=>{ isRecording=false; $('btn-mic').classList.remove('recording'); };
  recognition.onerror=()=>{ isRecording=false; $('btn-mic').classList.remove('recording'); };
  recognition.start();
}

// ─── CAPTURE ──────────────────────────────────────────────────────────────────
async function runCapture(){
  const texto = $('capture-input').value.trim();
  if(!texto) return;
  if(!apiKey){ showFeedback('Configura a API key nas definições.',false); return; }

  showFeedback('A classificar...',null);
  const leadsCtx = leads.slice(0,12).map(l=>`${l.id}:${l.company}`).join(',');
  const frentesCtx = frentes.map(f=>`${f.id}:${f.nome}`).join(',');

  const prompt = `Classifica esta nota do Samuel Constantino da Alitec: "${texto}"
Leads: ${leadsCtx||'nenhum'}
Frentes: ${frentesCtx}
Responde APENAS JSON válido:
{"tipo":"interacao_lead"|"tarefa_frente"|"update_frente"|"incerto","confianca":"alta"|"baixa","destino_id":N|null,"destino_nome":"","acao":"","data_limite":"YYYY-MM-DD"|null,"prioridade":"alta"|"normal","pergunta":null|"pergunta se incerto"}
Regras: empresa/cliente→interacao_lead; frente+ação futura→tarefa_frente; frente+aconteceu→update_frente`;

  try{
    const res=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json','x-api-key':apiKey,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},body:JSON.stringify({model:'claude-haiku-4-5-20251001',max_tokens:300,messages:[{role:'user',content:prompt}]})});
    const d=await res.json();
    const parsed=JSON.parse(d.content[0].text.replace(/```json|```/g,'').trim());
    processCaptureResult(parsed, texto);
  }catch(e){ showFeedback('Erro: '+e.message, false); }
}

function processCaptureResult(p, original){
  if(p.confianca==='baixa'||p.tipo==='incerto'){
    const btns = frentes.map(f=>`<button onclick="confirmCapture('${p.tipo==='incerto'?'tarefa_frente':p.tipo}',${f.id},'${original.replace(/'/g,"\\'")}',null,'normal')" style="display:inline-flex;padding:6px 12px;margin:3px;background:var(--surface2);border:1px solid var(--sep);border-radius:8px;font-size:13px;cursor:pointer;color:var(--text);font-family:inherit;">${f.nome}</button>`).join('');
    showFeedback(`<strong>${p.pergunta||'Onde devo guardar isto?'}</strong><div style="margin-top:8px;">${btns}</div>`, null, true);
    return;
  }
  const tipoL={interacao_lead:'Interação registada no lead',tarefa_frente:'Tarefa criada na frente',update_frente:'Update registado na frente'};
  showFeedback(`<strong style="color:var(--green)">✓ ${tipoL[p.tipo]||p.tipo}:</strong> ${p.destino_nome} — "${p.acao}"<br><div style="display:flex;gap:8px;margin-top:10px;"><button onclick="confirmCapture('${p.tipo}',${p.destino_id},'${original.replace(/'/g,"\\'")}','${p.data_limite||''}','${p.prioridade}')" style="padding:8px 16px;background:var(--accent);color:#fff;border:none;border-radius:8px;font-size:14px;cursor:pointer;font-family:inherit;">Confirmar</button><button onclick="hideFeedback()" style="padding:8px 16px;background:var(--surface2);border:none;border-radius:8px;font-size:14px;cursor:pointer;font-family:inherit;">Cancelar</button></div>`, null, true);
}

async function confirmCapture(tipo, id, original, data_limite, prioridade){
  if(tipo==='interacao_lead'){
    await db.from('interactions').insert({lead_id:id,date:today(),type:'outro',notes:original});
    await db.from('leads').update({last_interaction:today()}).eq('id',id);
    const l=leads.find(l=>l.id==id); if(l) l.last_interaction=today();
  }else if(tipo==='tarefa_frente'){
    await db.from('tarefas').insert({frente_id:id,texto:original,prioridade:prioridade||'normal',data_limite:data_limite||null,estado:'aberta'});
  }else if(tipo==='update_frente'){
    await db.from('frente_updates').insert({frente_id:id,texto:original});
  }
  $('capture-input').value='';
  showFeedback('✓ Guardado.',true);
  setTimeout(hideFeedback,1500);
  loadPriorities(); loadFrente();
}

function showFeedback(html, ok, raw){
  const el=$('capture-feedback');
  el.style.display='block';
  el.style.color=ok===true?'var(--green)':ok===false?'var(--red)':'var(--text)';
  if(raw) el.innerHTML=html; else el.textContent=html;
}
function hideFeedback(){ $('capture-feedback').style.display='none'; }

// ─── PRIORITIES ───────────────────────────────────────────────────────────────
function loadPriorities(){
  const active=leads.filter(l=>l.stage!=='ganho'&&l.stage!=='perdido');
  const overdue=active.filter(l=>l.followup&&daysDiff(l.followup)<0);
  const todayL=active.filter(l=>l.followup===today());
  const inactive=active.filter(l=>{const d=daysSince(l.last_interaction||l.created_at?.split('T')[0]);return d!==null&&d>=14;});

  // badge counts
  const od=overdue.length;
  [$('sdb-overdue'),$('bnb-overdue')].forEach(b=>{if(b){b.textContent=od;b.style.display=od?'':'none';}});

  const items=[];
  overdue.slice(0,3).forEach(l=>items.push({dot:'red',title:l.company,sub:`Follow-up atrasado ${Math.abs(daysDiff(l.followup))}d`,action:()=>openLead(l.id)}));
  todayL.slice(0,2).forEach(l=>items.push({dot:'orange',title:l.company,sub:'Follow-up hoje',action:()=>openLead(l.id)}));
  inactive.slice(0,2).forEach(l=>items.push({dot:'orange',title:l.company,sub:`Sem contacto há ${daysSince(l.last_interaction||l.created_at?.split('T')[0])}d`,action:()=>openLead(l.id)}));

  const el=$('priority-list');
  if(!items.length){ el.innerHTML='<div class="priority-item"><div class="pi-dot green"></div><div class="pi-content"><div class="pi-title">Tudo em dia 🎉</div></div></div>'; return; }
  el.innerHTML=items.map(i=>`<div class="priority-item" onclick="(${i.action.toString()})()">
    <div class="pi-dot ${i.dot}"></div>
    <div class="pi-content"><div class="pi-title">${i.title}</div><div class="pi-sub">${i.sub}</div></div>
    <svg class="pi-arrow" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="m9 18 6-6-6-6"/></svg>
  </div>`).join('<div class="row-sep"></div>');
}

async function loadLeads(){
  const {data}=await db.from('leads').select('*').order('created_at',{ascending:false});
  leads=data||[];
  renderLeads();
  loadPriorities();
}

function renderLeads(){
  let filtered;
  if(activeLeadFilter==='overdue') filtered=leads.filter(l=>l.followup&&daysDiff(l.followup)<0&&l.stage!=='ganho'&&l.stage!=='perdido');
  else if(activeLeadFilter==='ganho') filtered=leads.filter(l=>l.stage==='ganho');
  else if(activeLeadFilter==='todos') filtered=leads.filter(l=>l.stage!=='perdido');
  else filtered=leads.filter(l=>l.stage===activeLeadFilter);

  const el=$('leads-list');
  if(!filtered.length){el.innerHTML='<div class="empty-state"><div class="empty-icon">👤</div><div class="empty-text">Sem leads nesta vista</div></div>';return;}

  el.innerHTML=filtered.map((l,i)=>{
    const diff=l.followup?daysDiff(l.followup):null;
    const isOD=diff!==null&&diff<0&&l.stage!=='ganho'&&l.stage!=='perdido';
    const ds=daysSince(l.last_interaction||l.created_at?.split('T')[0]);
    const isInact=ds!==null&&ds>=14&&l.stage!=='ganho'&&l.stage!=='perdido';
    let fBadge='';
    if(isOD) fBadge=`<span class="badge badge-overdue">Atrasado ${Math.abs(diff)}d</span>`;
    else if(diff===0) fBadge='<span class="badge badge-today">Hoje</span>';
    else if(diff!==null&&diff<=3) fBadge=`<span class="badge badge-soon">Em ${diff}d</span>`;
    return `${i>0?'<div class="row-sep"></div>':''}<div class="lead-card" onclick="openLead(${l.id})">
      <div class="lead-name">${l.company}</div>
      <div class="lead-meta">${[mktL[l.market]||l.market,l.product].filter(Boolean).join(' · ')}</div>
      <div class="lead-badges">
        <span class="badge badge-${l.stage}">${stageL[l.stage]}</span>
        ${fBadge}
        ${isInact?`<span class="badge badge-inactive">${ds}d sem contacto</span>`:''}
      </div>
    </div>`;
  }).join('');
}

function setFilter(f,el){
  activeLeadFilter=f;
  document.querySelectorAll('.section .badge').forEach(b=>{b.style.fontWeight='500';b.style.opacity='.6';});
  el.style.fontWeight='700'; el.style.opacity='1';
  renderLeads();
}

async function openLead(id){

async function updateLead(field,val){
  if(!currentLead) return;
  await db.from('leads').update({[field]:val||null}).eq('id',currentLead.id);
  currentLead[field]=val;
  const l=leads.find(l=>l.id===currentLead.id); if(l) l[field]=val;
  $('ml-sub').textContent=[mktL[currentLead.market],currentLead.product,stageL[currentLead.stage]].filter(Boolean).join(' · ');
  renderLeads(); loadPriorities();
}

async function deleteLead(){
  if(!currentLead||!confirm('Remover este lead?')) return;
  await db.from('leads').delete().eq('id',currentLead.id);
  leads=leads.filter(l=>l.id!==currentLead.id);
  closeModal('modal-lead'); renderLeads(); loadPriorities();
}

    <div style="background:var(--surface2);border-radius:10px;padding:12px;margin-bottom:12px;">
      <textarea class="form-textarea" id="fu-texto" placeholder="o que aconteceu, decisão tomada..." style="height:60px;margin-bottom:8px;"></textarea>
      <button class="btn btn-primary btn-sm" onclick="addFrenteUpdate()">Guardar update</button>
    </div>
    ${(data||[]).map(u=>`<div style="padding:10px 0;border-bottom:1px solid var(--sep);">
      <div style="font-size:12px;color:var(--text3);margin-bottom:4px;">${new Date(u.created_at).toLocaleDateString('pt-PT',{day:'numeric',month:'long',year:'numeric'})}</div>
      <div style="font-size:15px;line-height:1.5;">${u.texto}</div>
    </div>`).join('')}
    ${(data||[]).length===0?'<div style="color:var(--text3);font-size:14px;padding:8px 0;">Sem updates registados.</div>':''}
  </div>`;
}

async function addFrenteUpdate(){
  const texto=$('fu-texto').value.trim(); if(!texto||!currentFrente) return;
  await db.from('frente_updates').insert({frente_id:currentFrente.id,texto});
  loadFrenteUpdates();
}

// ─── MODAL TABS ───────────────────────────────────────────────────────────────
function switchSTab(modal,name,el){ switchMTab(modal,name,el); }
function switchMTab(modal,name,el){
  const prefix = modal==='lead'?'ltab':'ftab';
  document.querySelectorAll(`#modal-${modal} .stab`).forEach(t=>t.classList.remove('active'));
  document.querySelectorAll(`#modal-${modal} .stab-pane`).forEach(p=>p.classList.remove('active'));
  el.classList.add('active');
  $(prefix+'-'+name).classList.add('active');
  if(modal==='lead'&&name==='contactos') loadLeadContactos();
  if(modal==='lead'&&name==='amostras') loadLeadAmostras();
  if(modal==='lead'&&name==='historico') loadLeadHistorico();
  if(modal==='frente'&&name==='tarefas') loadFrenteTarefas();
  if(modal==='frente'&&name==='updates') loadFrenteUpdates();
}


async function loadLeadAmostras(){
  const{data}=await db.from('samples').select('*').eq('lead_id',currentLead.id).order('sent_date',{ascending:false});
  const c=$('ltab-amostras');
  const rows=(data||[]).map(x=>`
  <div class="history-item">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:6px;">
      <span style="font-size:15px;font-weight:600;">${x.products}</span>
      <span class="badge ${x.converted?'b-ganho':'b-contactado'}">${x.converted?'Converteu':'Pendente'}</span>
    </div>
    <div class="history-date">${x.sent_date||'—'}</div>
    ${x.feedback?`<div class="history-text" style="margin-top:6px;">${x.feedback}</div>`:''}
  </div>`).join('');
  c.innerHTML=`<div>${rows||'<div class="empty-state"><div class="empty-icon">📦</div><div class="empty-text">Sem amostras</div></div>'}
  <div style="padding:12px 16px;">
    <div class="form-field"><label class="form-label">Produto(s)</label><input class="form-input" id="sa-prod" placeholder="ex: Farinha BD 35mesh 500g"/></div>
    <div class="form-row"><div class="form-field"><label class="form-label">Data envio</label><input type="date" class="form-input" id="sa-date"/></div><div class="form-field"><label class="form-label">Estado</label><select class="form-select" id="sa-conv"><option value="false">Pendente</option><option value="true">Converteu</option></select></div></div>
    <div class="form-field"><label class="form-label">Feedback</label><textarea class="form-textarea" id="sa-fb" style="height:60px;" placeholder="reação do cliente..."></textarea></div>
    <button class="btn btn-secondary btn-sm btn-full" onclick="addAmostra()">Registar amostra</button>
  </div></div>`;
}
async function addAmostra(){
  const prod=$('sa-prod').value.trim(); if(!prod) return;
  await db.from('samples').insert({lead_id:currentLead.id,products:prod,sent_date:$('sa-date').value||null,feedback:$('sa-fb').value.trim(),converted:$('sa-conv').value==='true'});
  loadLeadAmostras();
}
// ─── PRODUTOS ─────────────────────────────────────────────────────────────────
async function loadProdutos(){
  const{data}=await db.from('products').select('*').order('name');
  products=data||[];
  const el=$('produtos-list');
  if(!products.length){el.innerHTML='<div class="empty-state"><div class="empty-icon">📦</div><div class="empty-text">Sem produtos no catálogo</div></div>';return;}
  el.innerHTML=products.map((p,i)=>{
    const m=p.price_base&&p.cost?Math.round((p.price_base-p.cost)/p.price_base*100):null;
    const mc=m===null?'color:var(--text3)':m>=40?'color:var(--green)':m>=25?'color:var(--orange)':'color:var(--red)';
    return `${i>0?'<div class="row-sep"></div>':''}<div class="product-card">
      <div class="product-name">${p.name}</div>
      <div class="product-detail">${[p.reference,p.packaging].filter(Boolean).join(' · ')}</div>
      ${p.price_base!=null?`<div class="product-price">${p.price_base.toFixed(2)} €/kg${m!==null?`<span style="font-size:13px;margin-left:8px;${mc}">Margem ${m}%</span>`:''}</div>`:''}
      ${p.specs?`<div style="font-size:13px;color:var(--text3);margin-top:4px;line-height:1.4;">${p.specs}</div>`:''}
    </div>`;
  }).join('');
}

// ─── MODALS ───────────────────────────────────────────────────────────────────
function openModal(id){ $(id).classList.add('open'); }
function closeModal(id){ $(id).classList.remove('open'); }
document.querySelectorAll('.modal-overlay').forEach(m=>m.addEventListener('click',e=>{if(e.target===m)closeModal(m.id);}));

// ─── SETTINGS ─────────────────────────────────────────────────────────────────
function openSettings(){
  $('s-apikey').value=apiKey;
  openModal('modal-settings');
}
async function saveSettings(){
  apiKey=$('s-apikey').value.trim();
  localStorage.setItem('alitec-apikey',apiKey);
  await db.from('settings').upsert([
    {key:'briefing_weekday',value:$('s-briefing-week').value},
    {key:'briefing_saturday',value:$('s-briefing-sat').value},
    {key:'briefing_sunday',value:$('s-briefing-sun').value},
    {key:'anthropic_key',value:apiKey},
  ],{onConflict:'key'});
  closeModal('modal-settings');
  if(apiKey) loadBriefing();
  const btn=$('btn-save-settings');
  if(btn){ const orig=btn.textContent; btn.textContent='✓ Guardado'; setTimeout(()=>{btn.textContent=orig;},2000); }
}

async function loadSettings(){
  const{data}=await db.from('settings').select('*');
  const m={};(data||[]).forEach(r=>m[r.key]=r.value);
  if(m.briefing_weekday) $('s-briefing-week').value=m.briefing_weekday;
  if(m.briefing_saturday) $('s-briefing-sat').value=m.briefing_saturday;
  if(m.briefing_sunday) $('s-briefing-sun').value=m.briefing_sunday;
  // Load API key from DB if not in localStorage
  if(!apiKey && m.anthropic_key) {
    apiKey = m.anthropic_key;
    localStorage.setItem('alitec-apikey', apiKey);
  }
}

// ─── PWA ──────────────────────────────────────────────────────────────────────
if('serviceWorker' in navigator){
  navigator.serviceWorker.register('/sw.js').catch(console.error);
}

// ─── INIT ─────────────────────────────────────────────────────────────────────
async function init(){
  apiKey=localStorage.getItem('alitec-apikey')||'';
  setGreeting();
  await loadSettings(); // may update apiKey from Supabase
  await Promise.all([loadLeads(), loadFrente()]);
  await loadBriefing(); // called after loadSettings so apiKey is fresh
  // fab hidden by default via CSS display:none
}
init();
</script>
</body>
</html>
